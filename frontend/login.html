<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kanban DevOps — Login</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="auth-page">
  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-logo">
        <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
          <rect width="48" height="48" rx="12" fill="#6366f1"/>
          <rect x="8" y="12" width="10" height="24" rx="3" fill="white" opacity="0.9"/>
          <rect x="22" y="12" width="10" height="16" rx="3" fill="white" opacity="0.7"/>
          <rect x="36" y="12" width="4" height="10" rx="2" fill="white" opacity="0.5"/>
        </svg>
        <h1>Kanban MVP</h1>
      </div>
      <p class="auth-subtitle">Sign in to manage your projects</p>

      <div id="error-banner" class="error-banner hidden"></div>

      <form id="login-form" autocomplete="on">
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" name="username" placeholder="your-username"
                 autocomplete="username" required />
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="••••••••"
                 autocomplete="current-password" required />
        </div>
        <button type="submit" class="btn btn-primary btn-full" id="login-btn">
          Sign In
        </button>
      </form>

      <p class="auth-footer">
        Don't have an account?
        <a href="#" id="show-register">Register here</a>
      </p>

      <!-- Register form (hidden by default) -->
      <form id="register-form" class="hidden" autocomplete="on">
        <hr class="divider" />
        <h3>Create Account</h3>
        <div class="form-group">
          <label for="reg-username">Username</label>
          <input type="text" id="reg-username" name="username" placeholder="your-username" required />
        </div>
        <div class="form-group">
          <label for="reg-email">Email</label>
          <input type="email" id="reg-email" name="email" placeholder="you@example.com" required />
        </div>
        <div class="form-group">
          <label for="reg-password">Password</label>
          <input type="password" id="reg-password" name="password" placeholder="min 8 characters" required />
        </div>
        <button type="submit" class="btn btn-secondary btn-full" id="register-btn">
          Create Account
        </button>
      </form>
    </div>
  </div>

  <script src="js/auth.js"></script>
  <script>
    // Redirect if already logged in
    if (Auth.isLoggedIn()) window.location.href = 'index.html';

    const loginForm = document.getElementById('login-form');
    const registerForm = document.getElementById('register-form');
    const errorBanner = document.getElementById('error-banner');

    function showError(msg) {
      errorBanner.textContent = msg;
      errorBanner.classList.remove('hidden');
    }
    function clearError() {
      errorBanner.textContent = '';
      errorBanner.classList.add('hidden');
    }

    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      clearError();
      const btn = document.getElementById('login-btn');
      btn.disabled = true;
      btn.textContent = 'Signing in…';
      try {
        await Auth.login(
          document.getElementById('username').value.trim(),
          document.getElementById('password').value
        );
        window.location.href = 'index.html';
      } catch (err) {
        showError(err.message || 'Login failed. Check your credentials.');
        btn.disabled = false;
        btn.textContent = 'Sign In';
      }
    });

    document.getElementById('show-register').addEventListener('click', (e) => {
      e.preventDefault();
      registerForm.classList.toggle('hidden');
    });

    registerForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      clearError();
      const btn = document.getElementById('register-btn');
      btn.disabled = true;
      btn.textContent = 'Creating account…';
      try {
        await Auth.register(
          document.getElementById('reg-username').value.trim(),
          document.getElementById('reg-email').value.trim(),
          document.getElementById('reg-password').value
        );
        // Auto-login after register
        await Auth.login(
          document.getElementById('reg-username').value.trim(),
          document.getElementById('reg-password').value
        );
        window.location.href = 'index.html';
      } catch (err) {
        showError(err.message || 'Registration failed.');
        btn.disabled = false;
        btn.textContent = 'Create Account';
      }
    });
  </script>
</body>
</html>
