<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kanban DevOps MVP</title>
    <style>
      :root {
        --bg: #0f172a;
        --surface: #111827;
        --card: #1f2937;
        --text: #e5e7eb;
        --accent: #22c55e;
        --muted: #94a3b8;
      }
      body {
        margin: 0;
        font-family: "DejaVu Sans", sans-serif;
        background: radial-gradient(circle at 20% 10%, #1e293b, #0b1220 60%);
        color: var(--text);
        min-height: 100vh;
        display: grid;
        place-items: center;
      }
      .card {
        width: min(760px, 92vw);
        background: linear-gradient(160deg, var(--surface), var(--card));
        border: 1px solid #334155;
        border-radius: 16px;
        padding: 28px;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.35);
      }
      h1 {
        margin: 0 0 10px;
        font-size: 1.8rem;
      }
      p {
        color: var(--muted);
        line-height: 1.5;
      }
      ul {
        padding-left: 18px;
      }
      a {
        color: var(--accent);
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>Kanban DevOps MVP en marcha</h1>
      <p>El stack base esta levantado. Usa estos enlaces para validar servicios.</p>
      <ul>
        <li><a href="http://localhost:8000/docs">API Swagger</a></li>
        <li><a href="http://localhost:8000/health">API Health</a></li>
        <li><a href="http://localhost:9090">Prometheus</a></li>
        <li><a href="http://localhost:3000">Grafana</a></li>
      </ul>
    </main>
  </body>
</html>
