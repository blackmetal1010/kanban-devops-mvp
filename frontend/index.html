<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kanban DevOps Board</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <!-- Header -->
  <header class="app-header">
    <div class="header-left">
      <svg width="32" height="32" viewBox="0 0 48 48" fill="none">
        <rect width="48" height="48" rx="10" fill="#6366f1"/>
        <rect x="8" y="12" width="10" height="24" rx="3" fill="white" opacity="0.9"/>
        <rect x="22" y="12" width="10" height="16" rx="3" fill="white" opacity="0.7"/>
        <rect x="36" y="12" width="4" height="10" rx="2" fill="white" opacity="0.5"/>
      </svg>
      <span class="app-title">Kanban MVP</span>
    </div>
    <div class="header-center">
      <select id="project-select" class="project-select">
        <option value="">— Select a project —</option>
      </select>
      <button class="btn btn-ghost btn-sm" id="new-project-btn" title="New project">+ Project</button>
    </div>
    <div class="header-right">
      <span id="user-greeting" class="user-greeting"></span>
      <button class="btn btn-ghost btn-sm" id="theme-toggle" title="Toggle theme">🌙</button>
      <button class="btn btn-ghost btn-sm" id="logout-btn">Logout</button>
    </div>
  </header>

  <!-- Notification toast -->
  <div id="toast" class="toast hidden"></div>

  <!-- Main board -->
  <main class="board-container" id="board">
    <div class="board-empty" id="board-empty">
      <p>Select or create a project to view the board.</p>
    </div>

    <!-- Kanban columns (shown when project is selected) -->
    <div class="board-columns hidden" id="board-columns">
      <!-- Todo Column -->
      <div class="column" id="col-todo" data-status="todo"
           ondragover="event.preventDefault()" ondrop="App.handleDrop(event)">
        <div class="column-header">
          <span class="column-title">To Do</span>
          <span class="column-count badge" id="count-todo">0</span>
          <button class="btn btn-ghost btn-xs" onclick="App.openTaskModal(null, 'todo')">+</button>
        </div>
        <div class="task-list" id="tasks-todo"></div>
      </div>

      <!-- In Progress Column -->
      <div class="column" id="col-in_progress" data-status="in_progress"
           ondragover="event.preventDefault()" ondrop="App.handleDrop(event)">
        <div class="column-header">
          <span class="column-title">In Progress</span>
          <span class="column-count badge" id="count-in_progress">0</span>
          <button class="btn btn-ghost btn-xs" onclick="App.openTaskModal(null, 'in_progress')">+</button>
        </div>
        <div class="task-list" id="tasks-in_progress"></div>
      </div>

      <!-- Done Column -->
      <div class="column" id="col-done" data-status="done"
           ondragover="event.preventDefault()" ondrop="App.handleDrop(event)">
        <div class="column-header">
          <span class="column-title">Done</span>
          <span class="column-count badge" id="count-done">0</span>
          <button class="btn btn-ghost btn-xs" onclick="App.openTaskModal(null, 'done')">+</button>
        </div>
        <div class="task-list" id="tasks-done"></div>
      </div>
    </div>
  </main>

  <!-- Task Modal -->
  <div class="modal-overlay hidden" id="task-modal-overlay" onclick="App.closeTaskModal()">
    <div class="modal" onclick="event.stopPropagation()">
      <div class="modal-header">
        <h2 id="modal-title">New Task</h2>
        <button class="modal-close" onclick="App.closeTaskModal()">&times;</button>
      </div>
      <form id="task-form">
        <input type="hidden" id="task-id" />
        <div class="form-group">
          <label for="task-title">Title <span class="required">*</span></label>
          <input type="text" id="task-title" placeholder="Task title" required />
        </div>
        <div class="form-group">
          <label for="task-description">Description</label>
          <textarea id="task-description" rows="3" placeholder="Optional description…"></textarea>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="task-status">Status</label>
            <select id="task-status">
              <option value="todo">To Do</option>
              <option value="in_progress">In Progress</option>
              <option value="done">Done</option>
            </select>
          </div>
          <div class="form-group">
            <label for="task-priority">Priority</label>
            <select id="task-priority">
              <option value="low">Low</option>
              <option value="medium" selected>Medium</option>
              <option value="high">High</option>
            </select>
          </div>
        </div>
        <div class="form-group">
          <label for="task-due-date">Due Date</label>
          <input type="datetime-local" id="task-due-date" />
        </div>
        <div class="modal-actions">
          <button type="button" class="btn btn-ghost" onclick="App.closeTaskModal()">Cancel</button>
          <button type="button" class="btn btn-danger hidden" id="delete-task-btn"
                  onclick="App.deleteCurrentTask()">Delete</button>
          <button type="submit" class="btn btn-primary" id="save-task-btn">Save Task</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Project Modal -->
  <div class="modal-overlay hidden" id="project-modal-overlay" onclick="closeProjectModal()">
    <div class="modal" onclick="event.stopPropagation()">
      <div class="modal-header">
        <h2>New Project</h2>
        <button class="modal-close" onclick="closeProjectModal()">&times;</button>
      </div>
      <form id="project-form">
        <div class="form-group">
          <label for="project-name">Name <span class="required">*</span></label>
          <input type="text" id="project-name" placeholder="My Project" required />
        </div>
        <div class="form-group">
          <label for="project-desc">Description</label>
          <textarea id="project-desc" rows="2" placeholder="Optional…"></textarea>
        </div>
        <div class="modal-actions">
          <button type="button" class="btn btn-ghost" onclick="closeProjectModal()">Cancel</button>
          <button type="submit" class="btn btn-primary">Create Project</button>
        </div>
      </form>
    </div>
  </div>

  <script src="js/auth.js"></script>
  <script src="js/api.js"></script>
  <script src="js/app.js"></script>
  <script>
    function closeProjectModal() {
      document.getElementById('project-modal-overlay').classList.add('hidden');
    }

    document.getElementById('new-project-btn').addEventListener('click', () => {
      document.getElementById('project-modal-overlay').classList.remove('hidden');
    });

    document.getElementById('project-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const name = document.getElementById('project-name').value.trim();
      const description = document.getElementById('project-desc').value.trim();
      try {
        const project = await API.post('/api/projects/', { name, description });
        closeProjectModal();
        document.getElementById('project-name').value = '';
        document.getElementById('project-desc').value = '';
        await App.loadProjects();
        document.getElementById('project-select').value = project.id;
        await App.selectProject(project.id);
        App.showToast(`Project "${project.name}" created!`);
      } catch (err) {
        App.showToast(err.message || 'Failed to create project', 'error');
      }
    });

    document.getElementById('logout-btn').addEventListener('click', () => {
      Auth.logout();
      window.location.href = 'login.html';
    });

    document.getElementById('theme-toggle').addEventListener('click', () => {
      const isDark = document.body.classList.toggle('dark');
      document.getElementById('theme-toggle').textContent = isDark ? '☀️' : '🌙';
      localStorage.setItem('theme', isDark ? 'dark' : 'light');
    });

    // Apply saved theme
    if (localStorage.getItem('theme') === 'dark') {
      document.body.classList.add('dark');
      document.getElementById('theme-toggle').textContent = '☀️';
    }
  </script>
</body>
</html>
