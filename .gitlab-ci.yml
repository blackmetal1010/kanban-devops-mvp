stages:
  - test
  - build
  - deploy

variables:
  DOCKER_IMAGE: $CI_REGISTRY_IMAGE
  POSTGRES_DB: kanban_test
  POSTGRES_USER: kanban_user
  POSTGRES_PASSWORD: testpassword

test:backend:
  stage: test
  image: python:3.11-slim
  services:
    - postgres:15
    - redis:7
  variables:
    DATABASE_URL: postgresql://kanban_user:testpassword@postgres/kanban_test
    REDIS_URL: redis://redis:6379/0
    SECRET_KEY: test-secret-key-for-ci-min-32-chars-long
  before_script:
    - cd backend && pip install -r requirements.txt
  script:
    - pytest app/tests/ -v --tb=short
  coverage: '/TOTAL.*\s+(\d+%)$/'
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: backend/coverage.xml
    when: always

build:backend:
  stage: build
  image: docker:24
  services:
    - docker:24-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - docker build -t $DOCKER_IMAGE/backend:$CI_COMMIT_SHA backend/
    - docker push $DOCKER_IMAGE/backend:$CI_COMMIT_SHA
    - docker tag $DOCKER_IMAGE/backend:$CI_COMMIT_SHA $DOCKER_IMAGE/backend:latest
    - docker push $DOCKER_IMAGE/backend:latest
  only:
    - main
    - develop

deploy:production:
  stage: deploy
  image: alpine:latest
  before_script:
    - apk add --no-cache ansible openssh-client
    - eval $(ssh-agent -s)
    - echo "$SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh && chmod 700 ~/.ssh
    - echo "$SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts && chmod 644 ~/.ssh/known_hosts
  script:
    - ansible-playbook -i ansible/inventory/hosts.ini ansible/playbooks/deploy.yml
      -e "docker_image=$DOCKER_IMAGE/backend:$CI_COMMIT_SHA"
  environment:
    name: production
    url: http://$PRODUCTION_HOST
  only:
    - main
  when: manual
